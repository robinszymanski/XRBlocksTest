<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Mathe: Windschief vs. Schneidend (XR Blocks)</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        #info-layer { 
            position: absolute; 
            top: 20px; 
            width: 100%; 
            text-align: center; 
            color: rgba(255, 255, 255, 0.7); 
            pointer-events: none; 
            z-index: 10;
        }
    </style>
    
    <!-- Import Maps: Beinhaltet Troika Text gemäß den XR Blocks Guidelines -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "troika-three-text": "https://cdn.jsdelivr.net/npm/troika-three-text@0.49.0/dist/troika-three-text.esm.js",
            "troika-three-utils": "https://cdn.jsdelivr.net/npm/troika-three-utils@0.49.0/dist/troika-three-utils.esm.js",
            "troika-worker-utils": "https://cdn.jsdelivr.net/npm/troika-worker-utils@0.49.0/dist/troika-worker-utils.esm.js",
            "webgl-sdf-generator": "https://cdn.jsdelivr.net/npm/webgl-sdf-generator@1.1.1/dist/webgl-sdf-generator.mjs",
            "bidi-js": "https://cdn.jsdelivr.net/npm/bidi-js@1.0.3/dist/bidi.mjs"
        }
    }
    </script>
</head>
<body>
    <div id="info-layer">
        Wird in der XR Blocks Umgebung ausgeführt...
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { Text } from 'troika-three-text';

        // Fallback, um ReferenceErrors zu vermeiden, falls das Skript geladen wird, 
        // bevor die XR Blocks Umgebung das globale 'xb' Objekt injiziert hat.
        const xb = window.xb || {
            Script: class {
                add(obj) { 
                    // Fallback-Dummy
                }
            },
            user: { height: 1.6, objectDistance: -2 }
        };

        // =========================================================================
        // NATIVE VIBE CODING XR APP (Nutzt das echte xb.Script Framework)
        // =========================================================================
        
        class MainScript extends xb.Script {
            
            init() {
                this.currentTaskIndex = 0;
                
                // Container für Geraden
                this.linesGroup = new THREE.Group();
                this.add(this.linesGroup); // In XR Blocks ist 'this' idR die Scene

                // UI Container
                this.uiGroup = new THREE.Group();
                // Positionierung mithilfe der XR Blocks User-Variablen
                const userHeight = (window.xb && window.xb.user) ? window.xb.user.height : 1.6;
                const userDist = (window.xb && window.xb.user) ? window.xb.user.objectDistance : -2;
                this.uiGroup.position.set(0, userHeight, userDist);
                this.add(this.uiGroup);

                // Datenstruktur für die Aufgaben
                this.tasks = [
                    {
                        // Aufgabe 1: Schneidend im Ursprung
                        lines: [
                            { p: new THREE.Vector3(0, -0.5, 0), d: new THREE.Vector3(1, 0, 0) }, 
                            { p: new THREE.Vector3(0, -0.5, 0), d: new THREE.Vector3(0, 0, 1) }  
                        ],
                        isIntersecting: true
                    },
                    {
                        // Aufgabe 2: Windschief
                        lines: [
                            { p: new THREE.Vector3(0, -0.5, 0), d: new THREE.Vector3(1, 0, 0) }, 
                            { p: new THREE.Vector3(1, 0.5, 0), d: new THREE.Vector3(0, 0, 1) }  
                        ],
                        isIntersecting: false
                    },
                    {
                        // Aufgabe 3: Schneidend (Diagonalen)
                        lines: [
                            { p: new THREE.Vector3(-1, 0, -1), d: new THREE.Vector3(1, 0, 1) }, 
                            { p: new THREE.Vector3(1, 0, -1), d: new THREE.Vector3(-1, 0, 1) }
                        ],
                        isIntersecting: true
                    },
                    {
                        // Aufgabe 4: Windschief (Diagonalen auf unterschiedlichen Höhen)
                        lines: [
                            { p: new THREE.Vector3(-1, -0.5, -1), d: new THREE.Vector3(1, 0, 1) },
                            { p: new THREE.Vector3(1, 0.5, -1), d: new THREE.Vector3(-1, 0, 1) }
                        ],
                        isIntersecting: false
                    }
                ];

                this.setupEnvironment();
                this.setupGaze();
                this.setupUI();
                this.loadTask();
            }

            setupEnvironment() {
                // Koordinatensystem (Bodenraster)
                const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
                this.add(grid);

                // Achsen: X (Rot), Y (Grün), Z (Blau)
                const axesHelper = new THREE.AxesHelper(3);
                axesHelper.material.linewidth = 5;
                this.add(axesHelper);

                // Teleportationspunkte
                this.teleportPoints = [];
                const tpPositions = [
                    new THREE.Vector3(2, 0.01, 2),
                    new THREE.Vector3(-2, 0.01, 2),
                    new THREE.Vector3(2, 0.01, -2),
                    new THREE.Vector3(-2, 0.01, -2),
                    new THREE.Vector3(0, 0.01, 3)
                ];

                const tpGeom = new THREE.CircleGeometry(0.4, 32);
                const tpMat = new THREE.MeshBasicMaterial({ color: 0x0088ff, transparent: true, opacity: 0.5 });
                
                tpPositions.forEach(pos => {
                    const tp = new THREE.Mesh(tpGeom, tpMat);
                    tp.rotation.x = -Math.PI / 2;
                    tp.position.copy(pos);
                    tp.userData = {
                        isInteractable: true,
                        onClick: () => {
                            // Kamera-Rig in XR Blocks verschieben
                            if (this.camera && this.camera.parent) {
                                this.camera.parent.position.set(pos.x, 0, pos.z);
                            }
                        }
                    };
                    this.add(tp);
                    this.teleportPoints.push(tp);
                });
            }

            setupGaze() {
                this.gazeTimer = 0;
                this.gazedObject = null;
                this.raycaster = new THREE.Raycaster();

                // Reticle für Cardboard Interaktion
                const ringGeom = new THREE.RingGeometry(0.015, 0.03, 32);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, depthTest: false });
                this.reticle = new THREE.Mesh(ringGeom, ringMat);
                this.reticle.position.z = -1; // 1 Meter vor der Kamera
                this.reticle.renderOrder = 999;
                
                this.reticleAttached = false;
            }

            createTextButton(textStr, x, y, colorHex, onClickCallback) {
                // Nutzt Troika Text (Spezifikation aus Appendix C)
                const textObj = new Text();
                textObj.text = textStr;
                textObj.fontSize = 0.2;
                textObj.position.set(x, y, 0);
                textObj.color = 0xffffff;
                textObj.anchorX = 'center';
                textObj.anchorY = 'middle';
                textObj.sync();

                const planeGeom = new THREE.PlaneGeometry(1.2, 0.4);
                const planeMat = new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.8 });
                const button = new THREE.Mesh(planeGeom, planeMat);
                button.position.set(x, y, -0.05); // Leicht hinter dem Text
                button.userData = {
                    isInteractable: true,
                    onClick: onClickCallback
                };
                
                this.uiGroup.add(textObj);
                this.uiGroup.add(button);
                
                return { text: textObj, button: button };
            }

            setupUI() {
                // Haupt-Instruktionstext
                this.feedbackText = new Text();
                this.feedbackText.text = "Schneiden sich die Geraden?";
                this.feedbackText.fontSize = 0.15;
                this.feedbackText.position.set(0, 0.6, 0);
                this.feedbackText.color = 0xffffff;
                this.feedbackText.anchorX = 'center';
                this.feedbackText.sync();
                this.uiGroup.add(this.feedbackText);

                // Interaktive Buttons
                this.btnIntersect = this.createTextButton("Schneidend", -0.7, 0, 0x2ecc71, () => this.checkAnswer(true));
                this.btnSkew = this.createTextButton("Windschief", 0.7, 0, 0xe74c3c, () => this.checkAnswer(false));
                this.btnNext = this.createTextButton("Naechste Aufgabe", 0, -0.6, 0xf39c12, () => this.nextTask());
                
                this.setNextButtonVisible(false);
            }

            setNextButtonVisible(visible) {
                this.btnNext.text.visible = visible;
                this.btnNext.button.visible = visible;
                this.btnNext.button.userData.isInteractable = visible;
            }

            loadTask() {
                this.linesGroup.clear();

                const task = this.tasks[this.currentTaskIndex];
                const colors = [0x00ffff, 0xff00ff]; // Cyan und Magenta

                task.lines.forEach((line, index) => {
                    const p1 = new THREE.Vector3().copy(line.p).addScaledVector(line.d, -10);
                    const p2 = new THREE.Vector3().copy(line.p).addScaledVector(line.d, 10);
                    
                    const path = new THREE.LineCurve3(p1, p2);
                    const tubeGeom = new THREE.TubeGeometry(path, 20, 0.05, 8, false);
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: colors[index],
                        roughness: 0.3,
                        metalness: 0.1
                    });
                    
                    const mesh = new THREE.Mesh(tubeGeom, mat);
                    this.linesGroup.add(mesh);
                });

                // UI Reset
                this.feedbackText.text = "Schneiden sich die Geraden?";
                this.feedbackText.color = 0xffffff;
                this.feedbackText.sync();
                
                this.setNextButtonVisible(false);
                this.btnIntersect.button.userData.isInteractable = true;
                this.btnSkew.button.userData.isInteractable = true;
            }

            checkAnswer(choseIntersecting) {
                const task = this.tasks[this.currentTaskIndex];
                const isCorrect = (choseIntersecting === task.isIntersecting);

                if (isCorrect) {
                    this.feedbackText.text = "Richtig! Sehr gut gemacht.";
                    this.feedbackText.color = 0x2ecc71; // Grün
                } else {
                    this.feedbackText.text = "Leider Falsch! Schau genauer hin.";
                    this.feedbackText.color = 0xe74c3c; // Rot
                }
                this.feedbackText.sync();

                // Buttons deaktivieren
                this.btnIntersect.button.userData.isInteractable = false;
                this.btnSkew.button.userData.isInteractable = false;
                this.setNextButtonVisible(true);
            }

            nextTask() {
                this.currentTaskIndex = (this.currentTaskIndex + 1) % this.tasks.length;
                
                // Position zurücksetzen für optimale Sicht
                if (this.camera && this.camera.parent) {
                    this.camera.parent.position.set(0, 0, 0);
                }
                
                this.loadTask();
            }

            update(dt) {
                // Kamera aus der XR Blocks Umgebung holen, falls noch nicht geschehen
                if (!this.camera) {
                    if (window.xb && window.xb.camera) this.camera = window.xb.camera;
                    else if (this._camera) this.camera = this._camera;
                }

                if (this.camera) {
                    // Reticle beim ersten Frame an die Kamera hängen
                    if (!this.reticleAttached) {
                        this.camera.add(this.reticle);
                        this.add(this.camera);
                        this.reticleAttached = true;
                    }

                    // Billboarding: UI dreht sich zum Nutzer
                    const target = new THREE.Vector3(this.camera.position.x, this.uiGroup.position.y, this.camera.position.z);
                    this.uiGroup.lookAt(target);

                    // ==========================================
                    // Eigene Gaze-Steuerung für Cardboard (ohne Controller)
                    // ==========================================
                    const mat = new THREE.Matrix4();
                    mat.extractRotation(this.camera.matrixWorld);
                    const dir = new THREE.Vector3(0, 0, -1).applyMatrix4(mat);
                    const pos = new THREE.Vector3().setFromMatrixPosition(this.camera.matrixWorld);
                    this.raycaster.set(pos, dir);

                    const interactables = [];
                    this.uiGroup.children.forEach(c => { if(c.userData && c.userData.isInteractable) interactables.push(c); });
                    this.teleportPoints.forEach(tp => { if(tp.userData && tp.userData.isInteractable) interactables.push(tp); });

                    const intersects = this.raycaster.intersectObjects(interactables, false);

                    if (intersects.length > 0) {
                        const hitObject = intersects[0].object;
                        
                        if (this.gazedObject === hitObject) {
                            this.gazeTimer += dt;
                            
                            // Visuelles Feedback beim Anschauen
                            const scale = Math.max(0.1, 1 - (this.gazeTimer / 1.5) * 0.5);
                            this.reticle.scale.set(scale, scale, scale);
                            this.reticle.material.color.setHex(0x00ff00);

                            if (this.gazeTimer >= 1.5) {
                                hitObject.userData.onClick();
                                this.gazeTimer = 0;
                                this.gazedObject = null;
                            }
                        } else {
                            this.gazedObject = hitObject;
                            this.gazeTimer = 0;
                        }
                    } else {
                        this.gazedObject = null;
                        this.gazeTimer = 0;
                        this.reticle.scale.set(1, 1, 1);
                        this.reticle.material.color.setHex(0xffffff);
                    }
                }
            }
        }

        // Export für das XR Blocks System
        window.MainScript = MainScript;
        export default MainScript;
    </script>
</body>
</html>
